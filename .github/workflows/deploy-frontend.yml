name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    working-directory: src/frontend

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - uses: actions/configure-pages@v5
        id: pages

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Repository variable - set under Settings > Secrets and variables >
          # Actions > Variables once the backend has a public URL.
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          BASE_PATH: ${{ steps.pages.outputs.base_path }}/
        run: npm run build

      - name: Add SPA fallback for GitHub Pages
        run: cp build/client/index.html build/client/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: src/frontend/build/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
