# Activated via @ActiveProfiles("test") in integration test classes.
# No spring.datasource.* here: Testcontainers' @ServiceConnection wires the
# JDBC URL/credentials of the throwaway Postgres container automatically.
# No spring.mail.* here either: EmailService is replaced by a @MockitoBean
# in every integration test, so Spring never constructs the real bean and
# never needs real SMTP settings.

api.security.token.secret=test-secret-key-not-for-production-use-only-for-tests
app.base-url=http://localhost:8000
cors.allowed-origins=http://localhost:5173

jwt.expiration=3600000
verification.token.expiration=1800000
reset.token.expiration=900000

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
