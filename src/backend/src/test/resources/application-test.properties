# Activated via @ActiveProfiles("test") in integration test classes.
# No spring.datasource.* here: Testcontainers' @ServiceConnection wires the
# JDBC URL/credentials of the throwaway Postgres container automatically.
# spring.mail.host just needs to be present so Spring auto-configures a
# JavaMailSender bean (required to construct EmailService); no test ever
# sends a real email over it, and endpoint tests replace EmailService with
# a @MockitoBean anyway - this only matters for tests (like
# BackendApplicationTests) that load the full context without mocking it.

api.security.token.secret=test-secret-key-not-for-production-use-only-for-tests
app.base-url=http://localhost:8000
cors.allowed-origins=http://localhost:5173

spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test@example.com

jwt.expiration=3600000
verification.token.expiration=1800000
reset.token.expiration=900000

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
