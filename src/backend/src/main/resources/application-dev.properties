# secret key for JWT token
api.security.token.secret=${JWT_SECRET}
# server url configurations
server.port=8000
app.base-url=http://localhost:${server.port}
# cors allowed URL
cors.allowed-origins=http://localhost:5173,http://localhost:5000
# email that will send the emails
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=simuladordeinvestimentos@gmail.com
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# token spiry time
jwt.expiration=${JWT_EXPIRATION:3600000}
verification.token.expiration=${VERIFICATION_TOKEN_EXPIRATION:1800000}
reset.token.expiration=${RESET_TOKEN_EXPIRATION:900000}
# database settings
spring.datasource.url=jdbc:postgresql://localhost:${POSTGRES_PORT}/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
# JPA / Hibernate
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true