<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${subject}"></title>
</head>
<body style="
        margin:0;
        padding:0;
        background-color:#EFE8DA;
        font-family:'Zen Kaku Gothic New', Arial, Helvetica, sans-serif;
    ">

<table width="100%" cellpadding="0" cellspacing="0" border="0">
    <tr>
        <td align="center" style="padding:40px 20px;">

            <table width="600" cellpadding="0" cellspacing="0" border="0"
                   style="
                        background:#E7DECE;
                        border:3px solid #1B1611;
                   ">

                <tr>
                    <td style="
                            background:#1B1611;
                            padding:40px;
                            text-align:center;
                        ">
                        <div style="
                                display:inline-block;
                                width:40px;
                                height:40px;
                                background:#DD3A22;
                                color:#EFE8DA;
                                font-family:'Zen Old Mincho', Georgia, serif;
                                font-size:20px;
                                line-height:40px;
                                margin-bottom:14px;
                            ">印</div>
                        <h1 style="
                                margin:0;
                                color:#EFE8DA;
                                font-family:'Zen Old Mincho', Georgia, serif;
                                font-size:30px;
                                font-weight:700;
                            ">
                            Munehisa
                        </h1>

                        <p style="
                                margin-top:10px;
                                margin-bottom:0;
                                color:#7A705F;
                                font-family:'Space Mono', 'Courier New', monospace;
                                font-size:11px;
                                letter-spacing:.14em;
                                text-transform:uppercase;
                            ">
                            Secure Account Management
                        </p>
                    </td>
                </tr>

                <tr>
                    <td style="padding:40px">

                        <h2 th:text="${subject}" style="
                                margin-top:0;
                                color:#1B1611;
                                font-family:'Zen Old Mincho', Georgia, serif;
                                font-size:22px;
                                font-weight:700;
                            ">

                        </h2>

                        <p th:text="${message}" style="
                                color:#3A332A;
                                line-height:1.7;
                                font-size:16px;
                            ">
                        </p>

                        <div style="text-align:center; margin:40px 0;">
                            <a th:href="${actionUrl}"
                               style="
                                       background:#DD3A22;
                                       color:#EFE8DA;
                                       text-decoration:none;
                                       padding:16px 32px;
                                       display:inline-block;
                                       font-family:'Space Mono', 'Courier New', monospace;
                                       font-weight:bold;
                                       font-size:13px;
                                       letter-spacing:.1em;
                                       text-transform:uppercase;
                                   ">
                                Continue
                            </a>
                        </div>

                        <p style="
                                color:#7A705F;
                                font-size:14px;
                                line-height:1.6;
                            ">
                            If the button doesn't work, copy and paste the URL below into your browser:
                        </p>

                        <p th:text="${actionUrl}" style="
                                word-break:break-all;
                                color:#0C6156;
                                font-family:'Space Mono', 'Courier New', monospace;
                                font-size:13px;
                            ">
                        </p>

                    </td>
                </tr>

                <tr>
                    <td style="
                            background:#EFE8DA;
                            text-align:center;
                            padding:24px;
                            color:#7A705F;
                            font-family:'Space Mono', 'Courier New', monospace;
                            font-size:12px;
                            border-top:1px solid #1B161119;
                        ">
                        © 2026 Munehisa. All rights reserved.
                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
